<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WD Auto Mecânica e Elétrica | Loja 1 Sumaré</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-blue: #3b82f6;
            --accent-hover: #2563eb;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);

            /* Gradient Colors from file */
            --gradient-background-start: rgb(10, 20, 50);
            --gradient-background-end: rgb(0, 5, 20);
            --first-color: 18, 113, 255;
            --second-color: 59, 130, 246;
            --third-color: 37, 99, 235;
            --fourth-color: 29, 78, 216;
            --fifth-color: 30, 58, 138;
            --pointer-color: 140, 100, 255;
            --size: 80%;
            --blending-value: hard-light;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }

        /* --- Animated Background --- */
        .bg-gradient-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
            overflow: hidden;
            background: linear-gradient(40deg, var(--gradient-background-start), var(--gradient-background-end));
        }

        .svg-filter {
            display: none;
        }

        .gradients-container {
            filter: url(#blurMe) blur(40px);
            width: 100%;
            height: 100%;
        }

        .g1,
        .g2,
        .g3,
        .g4,
        .g5,
        .interactive {
            position: absolute;
            width: var(--size);
            height: var(--size);
            top: calc(50% - var(--size) / 2);
            left: calc(50% - var(--size) / 2);
            mix-blend-mode: var(--blending-value);
        }

        .g1 {
            background: radial-gradient(circle at center, rgba(var(--first-color), 0.8) 0, rgba(var(--first-color), 0) 50%) no-repeat;
            transform-origin: center center;
            animation: moveVertical 30s ease infinite;
        }

        .g2 {
            background: radial-gradient(circle at center, rgba(var(--second-color), 0.8) 0, rgba(var(--second-color), 0) 50%) no-repeat;
            transform-origin: calc(50% - 400px);
            animation: moveInCircle 20s reverse infinite;
        }

        .g3 {
            background: radial-gradient(circle at center, rgba(var(--third-color), 0.8) 0, rgba(var(--third-color), 0) 50%) no-repeat;
            transform-origin: calc(50% + 400px);
            animation: moveInCircle 40s linear infinite;
        }

        .g4 {
            background: radial-gradient(circle at center, rgba(var(--fourth-color), 0.8) 0, rgba(var(--fourth-color), 0) 50%) no-repeat;
            transform-origin: calc(50% - 200px);
            animation: moveHorizontal 40s ease infinite;
            opacity: 0.7;
        }

        .g5 {
            background: radial-gradient(circle at center, rgba(var(--fifth-color), 0.8) 0, rgba(var(--fifth-color), 0) 50%) no-repeat;
            transform-origin: calc(50% - 800px) calc(50% + 800px);
            animation: moveInCircle 20s ease infinite;
        }

        .interactive {
            background: radial-gradient(circle at center, rgba(var(--pointer-color), 0.8) 0, rgba(var(--pointer-color), 0) 50%) no-repeat;
            width: 100%;
            height: 100%;
            top: -50%;
            left: -50%;
            opacity: 0.7;
        }

        @keyframes moveHorizontal {
            0% {
                transform: translateX(-50%) translateY(-10%);
            }

            50% {
                transform: translateX(50%) translateY(10%);
            }

            100% {
                transform: translateX(-50%) translateY(-10%);
            }
        }

        @keyframes moveInCircle {
            0% {
                transform: rotate(0deg);
            }

            50% {
                transform: rotate(180deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes moveVertical {
            0% {
                transform: translateY(-50%);
            }

            50% {
                transform: translateY(50%);
            }

            100% {
                transform: translateY(-50%);
            }
        }

        .container {
            width: 100%;
            max-width: 420px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            position: relative;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* --- Logotipo --- */
        .logo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .logo {
            width: 140px;
            height: 140px;
            background: #fff;
            border-radius: 50%;
            object-fit: cover;
            padding: 5px;
            border: 4px solid var(--accent-blue);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.4);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .logo:hover {
            transform: rotate(5deg) scale(1.05);
        }

        /* --- Textos --- */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            font-size: 1rem;
            color: var(--text-primary);
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .descricao {
            font-size: 0.95rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        /* --- Redes Sociais --- */
        .redes-sociais {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-link {
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            transition: all 0.3s ease;
            color: var(--text-primary);
            text-decoration: none;
        }

        .social-link svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
        }

        .social-link:hover {
            background: var(--accent-blue);
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.3);
        }

        /* --- Botões --- */
        .links {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .botao {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 64px;
            padding: 12px 24px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1.05rem;
            font-weight: 500;
            border-radius: 18px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .botao::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg,
                    transparent,
                    rgba(255, 255, 255, 0.05),
                    transparent);
            transition: 0.5s;
        }

        .botao:hover::before {
            left: 100%;
        }

        .botao:hover {
            border-color: var(--accent-blue);
            background: rgba(59, 130, 246, 0.1);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .botao.principal {
            background: var(--accent-blue);
            border: none;
            font-weight: 600;
        }

        .botao.principal:hover {
            background: var(--accent-hover);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
        }

        /* Footer */
        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            opacity: 1.0;
        }

        footer a {
            color: inherit;
            /* Faz o link usar a mesma cor do texto do footer */
            text-decoration: underline;
            /* Mantém o sublinhado para indicar que é um link */
        }

        /* Mobile Adjustments */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.6rem;
            }

            .logo {
                width: 120px;
                height: 120px;
            }
        }
    </style>
</head>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const interBubble = document.querySelector('.interactive');
            let curX = 0;
            let curY = 0;
            let tgX = 0;
            let tgY = 0;

            function move() {
                curX += (tgX - curX) / 20;
                curY += (tgY - curY) / 20;
                interBubble.style.transform = `translate(${Math.round(curX)}px, ${Math.round(curY)}px)`;
                requestAnimationFrame(() => {
                    move();
                });
            }

            window.addEventListener('mousemove', (event) => {
                tgX = event.clientX;
                tgY = event.clientY;
            });

            move();
        });
    </script>
